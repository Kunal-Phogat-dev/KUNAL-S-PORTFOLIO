<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="120" fill="#09090b" />
  
  <!-- Subtle border -->
  <rect width="512" height="512" rx="120" fill="none" stroke="#27272a" stroke-width="4" />

  <!-- The glowing elements -->
  <g filter="url(#heavyGlow)">
    <g transform="translate(256, 256)">
      <!-- A stylized "K" composed of sleek polygons -->
      
      <!-- Vertical bar -->
      <path d="M-80,-120 L-40,-120 L-40,120 L-80,120 Z" fill="url(#cyanGrad)" />
      
      <!-- Top diagonal -->
      <path d="M-40,0 L60,-120 L110,-120 L0,20 Z" fill="url(#cyanGrad)" />
      
      <!-- Bottom diagonal -->
      <path d="M-20,0 L90,120 L40,120 L-40,-40 Z" fill="url(#purpleGrad)" />
      
      <!-- Tech accent dots -->
      <circle cx="80" cy="-60" r="12" fill="#22d3ee" />
      <circle cx="20" cy="80" r="10" fill="#8b5cf6" />
    </g>
  </g>
</svg>
